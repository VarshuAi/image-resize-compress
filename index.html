<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Mock Compressor — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">🖼</span>
                <div class="title-col">
                    <h1>Image Mock Compressor</h1>
                    <p class="tagline">Mock compressor showing visual weight reduction metrics.</p>
                </div>
            </div>
            <div class="badge">media</div>
        </header>

        <main class="workspace-card">
            
            <div style="font-size:18px; text-align:center; margin-bottom:16px;">Compress Ratio: <span style="color:var(--accent);">75% Save</span></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; text-align:center;">
                <div style="background:#0c0c14; padding:20px; border-radius:8px;">Original<br><strong>4.2 MB</strong></div>
                <div style="background:#0c0c14; padding:20px; border-radius:8px;">Compressed<br><strong style="color:var(--accent);">1.0 MB</strong></div>
            </div>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
